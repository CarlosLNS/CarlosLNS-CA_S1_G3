name: Deploy to GitHub Pages

on:
  push:
    branches:
      - principal  # <--- CAMBIADO A PRINCIPAL

permissions:
  contents: write
  pages: write      # Agregado
  id-token: write   # Agregado

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Proyecto2/my-website/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Proyecto2/my-website

      - name: Build website
        run: npm run build
        working-directory: Proyecto2/my-website
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Proyecto2/my-website/build